{% extends "base.html" %}

{% block content %}
<div class="flex-1 overflow-y-auto pr-2 flex flex-col items-center justify-center text-center">
    <div class="mb-4">
        <svg class="h-16 w-16 text-indigo-500 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
    </div>
    <h2 class="text-2xl font-semibold text-slate-800 mb-2">{{ message }}</h2>
    <p class="text-slate-500 max-w-sm">{{ sub_message }}</p>

    <div class="mt-8">
        <button onclick="alert('Alpine, HTMX, Tailwind, and FastAPI are ready to go!')"
            class="inline-flex items-center gap-x-2 rounded-lg bg-indigo-600 px-6 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 transition-all duration-200">
            Click Me
        </button>
    </div>
</div>
{% endblock %}
