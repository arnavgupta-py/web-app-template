<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web App Template</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-indigo-50 to-purple-50 h-screen overflow-hidden text-slate-800 antialiased flex flex-col items-center py-6 sm:py-12">
    <div class="w-full max-w-3xl px-4 sm:px-6 lg:px-8 flex flex-col h-full max-h-full">
        <header class="text-center mb-8 shrink-0">
            <h1
                class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 sm:text-5xl pb-1">
                MVP Skeleton
            </h1>
            <p class="mt-3 text-lg text-slate-500">A minimal, high-performance web app template</p>
        </header>

        <main
            class="bg-white/70 backdrop-blur-xl shadow-2xl ring-1 ring-black/5 rounded-2xl p-6 sm:p-10 flex flex-col flex-1 min-h-0 overflow-hidden">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>

</html>
